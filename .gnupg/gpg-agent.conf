# ~/.gnupg/gpg-agent.conf

# PIN entry program (pinentry or pinentry-mac)
pinentry-program /opt/homebrew/bin/pinentry-mac

# Do not cache passwords
default-cache-ttl 1
max-cache-ttl 1

# Debug support OPTIONAL
# debug-level advanced
# log-file /var/log/gpg-agent.log

# Use GPG Agent as SSH agent
# enable-ssh-support

# GPG key forwarding over SSH
# extra-socket /Users/awdeorio/.gnupg/S.gpg-agent.extra
